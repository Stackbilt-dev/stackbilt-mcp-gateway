name = "stackbilt-mcp-gateway"
main = "src/index.ts"
compatibility_date = "2026-03-07"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Service Bindings — backend product workers + auth
[[services]]
binding = "AUTH_SERVICE"
service = "stackbilt-auth"
entrypoint = "AuthEntrypoint"

[[services]]
binding = "STACKBILDER"
service = "edge-stack-architect-v2"

[[services]]
binding = "IMG_FORGE"
service = "img-forge-gateway"

# OAuth KV (shared namespace with img-forge-mcp during transition)
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "2a53015addb24102a71fc0c993715f4b"

# Custom domain — takes over from img-forge-mcp
# [[routes]]
# pattern = "mcp.stackbilt.dev"
# custom_domain = true
# NOTE: Uncomment after removing custom_domain from img-forge-mcp wrangler.toml

[vars]
API_BASE_URL = "https://mcp.stackbilt.dev"
